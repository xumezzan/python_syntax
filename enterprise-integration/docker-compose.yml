services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/app
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-long-random-string}
      BANK_FAIL_TIMES: ${BANK_FAIL_TIMES:-0}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES:-true}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
